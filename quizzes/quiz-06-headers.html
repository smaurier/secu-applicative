<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quiz 06 — En-têtes HTTP de Sécurité</title>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}body{font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;background:#1a1a2e;color:#e0e0e0;min-height:100vh;padding:2rem 1rem}.container{max-width:800px;margin:0 auto}h1{text-align:center;margin-bottom:.5rem;font-size:1.8rem;color:#fff}.subtitle{text-align:center;color:#8892b0;margin-bottom:2rem;font-size:1rem}.progress-bar-container{background:#0d1117;border-radius:10px;height:14px;margin-bottom:2rem;overflow:hidden}.progress-bar{background:linear-gradient(90deg,#0d6efd,#4dabf7);height:100%;width:0%;border-radius:10px;transition:width .4s}.progress-text{text-align:center;color:#8892b0;margin-bottom:1rem;font-size:.9rem}.card{background:#16213e;border-radius:12px;padding:2rem;margin-bottom:1.5rem;box-shadow:0 4px 20px rgba(0,0,0,.3)}.question-label{font-size:.85rem;color:#4dabf7;text-transform:uppercase;letter-spacing:1px;margin-bottom:.5rem}.question-text{font-size:1.15rem;margin-bottom:1.2rem;line-height:1.5;color:#fff}pre{background:#0d1117;border:1px solid #30363d;border-radius:8px;padding:1rem;margin-bottom:1.2rem;overflow-x:auto;font-size:.95rem}code{font-family:'Consolas','Fira Code','Courier New',monospace;color:#c9d1d9}.options{list-style:none}.options li{margin-bottom:.5rem}.options label{display:flex;align-items:center;gap:.75rem;padding:.8rem 1rem;background:#0d1117;border:2px solid #30363d;border-radius:8px;cursor:pointer;transition:border-color .2s,background .2s;font-size:1rem}.options label:hover{border-color:#4dabf7;background:#1c2a4a}.options input[type="radio"]{accent-color:#0d6efd;width:18px;height:18px;flex-shrink:0}.btn{display:inline-block;padding:.7rem 2rem;border:none;border-radius:8px;font-size:1rem;font-weight:600;cursor:pointer;transition:background .2s,transform .1s}.btn-primary{background:#0d6efd;color:#fff}.btn-primary:hover{background:#3b82f6}.btn-primary:disabled{background:#374151;cursor:not-allowed}.btn-restart{background:#238636;color:#fff;margin-top:1rem;padding:.7rem 2rem;border:none;border-radius:8px;font-size:1rem;font-weight:600;cursor:pointer}.btn-restart:hover{background:#2ea043}.feedback{margin-top:1rem;padding:1rem 1.2rem;border-radius:8px;font-size:.95rem;line-height:1.5;display:none}.feedback.correct{background:#0f5132;border:1px solid #198754;color:#d1fae5;display:block}.feedback.wrong{background:#842029;border:1px solid #dc3545;color:#fdd;display:block}.score-card{text-align:center;padding:3rem 2rem}.score-card .score{font-size:3rem;font-weight:700;color:#4dabf7;margin-bottom:.5rem}.score-card .score-label{font-size:1.2rem;color:#8892b0;margin-bottom:1.5rem}.hidden{display:none}
  </style>
</head>
<body>
  <div class="container">
    <h1>Quiz 06 — En-têtes HTTP de Sécurité</h1>
    <p class="subtitle">CSP, HSTS, X-Frame-Options et autres en-têtes de protection</p>
    <div class="progress-bar-container"><div class="progress-bar" id="progressBar"></div></div>
    <p class="progress-text" id="progressText">Question 1 / 5</p>
    <div id="quizContainer"></div>
    <div id="scoreContainer" class="card score-card hidden"></div>
  </div>
  <script>
    const questions = [
      {
        label: "Question 1 — Content-Security-Policy",
        text: "Quel en-tête HTTP empêche le chargement de scripts provenant de domaines non autorisés ?",
        code: "Content-Security-Policy: default-src 'self'; script-src 'self' https://cdn.example.com",
        options: [
          "X-Content-Type-Options",
          "Content-Security-Policy (CSP)",
          "Strict-Transport-Security",
          "X-Frame-Options"
        ],
        answer: 1,
        explanation: "CSP (Content-Security-Policy) définit les sources autorisées pour chaque type de ressource. <code>script-src 'self' https://cdn.example.com</code> n'autorise les scripts que depuis le même domaine et cdn.example.com."
      },
      {
        label: "Question 2 — HSTS",
        text: "Que fait l'en-tête Strict-Transport-Security ?",
        code: "Strict-Transport-Security: max-age=31536000; includeSubDomains; preload",
        options: [
          "Il bloque les requêtes HTTP non chiffrées et force l'utilisation de HTTPS",
          "Il chiffre les en-têtes HTTP",
          "Il valide les certificats SSL des sous-domaines",
          "Il empêche les attaques DDoS"
        ],
        answer: 0,
        explanation: "HSTS indique au navigateur de ne JAMAIS se connecter en HTTP, uniquement en HTTPS. <code>max-age</code> définit la durée de cette politique, <code>includeSubDomains</code> l'étend aux sous-domaines, et <code>preload</code> permet l'inclusion dans la liste preload des navigateurs."
      },
      {
        label: "Question 3 — X-Frame-Options",
        text: "Contre quelle attaque protège l'en-tête X-Frame-Options: DENY ?",
        options: [
          "SQL Injection",
          "Clickjacking (l'inclusion du site dans un iframe malveillant)",
          "Cross-Site Scripting (XSS)",
          "Cross-Site Request Forgery (CSRF)"
        ],
        answer: 1,
        explanation: "Le clickjacking consiste à intégrer un site dans un iframe invisible pour piéger l'utilisateur. <code>X-Frame-Options: DENY</code> empêche totalement l'inclusion dans un iframe. L'alternative moderne est <code>CSP: frame-ancestors 'none'</code>."
      },
      {
        label: "Question 4 — CSP unsafe-inline",
        text: "Pourquoi la directive <code>'unsafe-inline'</code> dans une CSP est-elle déconseillée ?",
        code: "Content-Security-Policy: script-src 'self' 'unsafe-inline'",
        options: [
          "Elle ralentit le chargement des pages",
          "Elle autorise l'exécution de scripts inline, annulant une grande partie de la protection CSP contre le XSS",
          "Elle est incompatible avec les navigateurs modernes",
          "Elle empêche le caching des scripts"
        ],
        answer: 1,
        explanation: "<code>'unsafe-inline'</code> autorise les scripts inline (<code>&lt;script&gt;alert(1)&lt;/script&gt;</code>), ce qui annule la protection contre le XSS. Préférez les nonces (<code>'nonce-abc123'</code>) ou les hashes de scripts spécifiques."
      },
      {
        label: "Question 5 — X-Content-Type-Options",
        text: "Que fait l'en-tête <code>X-Content-Type-Options: nosniff</code> ?",
        options: [
          "Il empêche le navigateur de détecter automatiquement le type MIME (MIME sniffing)",
          "Il masque le type de serveur dans les réponses",
          "Il désactive la compression des réponses",
          "Il empêche le téléchargement de fichiers"
        ],
        answer: 0,
        explanation: "<code>nosniff</code> empêche le navigateur de deviner le type MIME d'une ressource. Sans cet en-tête, un fichier uploadé en .txt contenant du JavaScript pourrait être interprété comme un script par le navigateur (MIME confusion attack)."
      }
    ];

    let current=0,score=0,answered=false;const container=document.getElementById('quizContainer'),scoreContainer=document.getElementById('scoreContainer'),progressBar=document.getElementById('progressBar'),progressText=document.getElementById('progressText');function render(){if(current>=questions.length)return showScore();const q=questions[current];progressBar.style.width=((current/questions.length)*100)+'%';progressText.textContent=`Question ${current+1} / ${questions.length}`;answered=false;let html=`<div class="card"><p class="question-label">${q.label}</p><p class="question-text">${q.text}</p>`;if(q.code)html+=`<pre><code>${q.code}</code></pre>`;html+=`<ul class="options">`;q.options.forEach((opt,i)=>{html+=`<li><label><input type="radio" name="q" value="${i}"><span>${opt}</span></label></li>`;});html+=`</ul><button class="btn btn-primary" id="submitBtn" disabled onclick="checkAnswer()">Valider</button><div id="feedback" class="feedback"></div></div>`;container.innerHTML=html;document.querySelectorAll('input[name="q"]').forEach(input=>{input.addEventListener('change',()=>{if(!answered)document.getElementById('submitBtn').disabled=false;});});}function checkAnswer(){if(answered)return;answered=true;const selected=document.querySelector('input[name="q"]:checked');if(!selected)return;const idx=parseInt(selected.value),q=questions[current],feedback=document.getElementById('feedback');if(idx===q.answer){score++;feedback.className='feedback correct';feedback.innerHTML=`✅ Correct ! ${q.explanation}`;}else{feedback.className='feedback wrong';feedback.innerHTML=`❌ Incorrect. ${q.explanation}`;}document.getElementById('submitBtn').textContent='Suivant →';document.getElementById('submitBtn').onclick=()=>{current++;render();};}function showScore(){progressBar.style.width='100%';progressText.textContent='Terminé !';container.innerHTML='';const pct=Math.round((score/questions.length)*100);let msg=pct===100?'🏆 Parfait !':pct>=60?'👍 Bien joué !':'📚 À revoir';scoreContainer.innerHTML=`<div class="score">${score}/${questions.length}</div><div class="score-label">${pct}% — ${msg}</div><button class="btn-restart" onclick="location.reload()">🔄 Recommencer</button>`;scoreContainer.classList.remove('hidden');}render();
  </script>
</body>
</html>
